<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* CSS */
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        /* Hover-Effekt */
        button:hover {
            background-color: #45a049;
        }
    </style>

</head>
<body>
    <button onclick="button()">Hit me</button>
    <script>
        function button() {
            alert("Hit!")
        }
    </script>
</body>
</html>
